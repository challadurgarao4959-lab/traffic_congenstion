version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: traffic_db
    environment:
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_password
      POSTGRES_DB: traffic_congestion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic_user -d traffic_congestion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: traffic_backend
    environment:
      - DATABASE_URL=postgresql://traffic_user:traffic_password@db:5432/traffic_congestion
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data

  frontend:
    build: ./frontend
    container_name: traffic_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
